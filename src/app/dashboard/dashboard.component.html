<div class="flex flex-column gap-4 w-full p-4 surface-ground">
  
  <div class="grid grid-nogutter gap-4">
    <div *ngFor="let metric of metrics" class="col-12 md:col-6 lg:col-3">
      <p-card styleClass="h-full shadow-2 border-round-xl border-none">
        <div class="flex align-items-center justify-content-between">
          <div>
            <div class="text-500 text-sm mb-1 font-medium">{{ metric.title }}</div>
            <div class="flex align-items-end gap-2">
              <div class="text-3xl font-bold text-blue-600" [ngClass]="{'text-4xl': metric.isTime}">
                {{ metric.value }}
              </div>
              <div *ngIf="metric.isTime" class="text-xl font-medium text-blue-600 mb-1">GMT+7</div>
            </div>
            <div *ngIf="!metric.isTime" class="text-xs text-blue-400 mt-1 font-medium">{{ metric.subtext }}</div>
          </div>
          <div *ngIf="metric.icon" class="w-3rem h-3rem border-round bg-gray-50 flex align-items-center justify-content-center border-1 border-100">
            <i [class]="metric.icon" class="text-xl text-700"></i>
          </div>
        </div>
      </p-card>
    </div>
  </div>

  <div class="w-full bg-white p-2 border-round-xl shadow-2 border-1 border-100 flex flex-wrap align-items-center justify-content-between gap-3">
    <div class="flex flex-wrap align-items-center gap-2">
      <p-dropdown [options]="zones" [(ngModel)]="selectedZone" optionLabel="label" 
                  styleClass="w-8rem border-none bg-gray-50 p-inputtext-sm text-sm" placeholder="โซน"></p-dropdown>
      
      <i class="pi pi-arrow-right-arrow-left text-400"></i>
      
      <p-calendar [(ngModel)]="selectedDate" dateFormat="dd/mm/yy" placeholder="dd/mm/yyyy" 
                  [showIcon]="true" styleClass="w-10rem p-inputtext-sm text-sm"></p-calendar>
      
      <p-dropdown [options]="statuses" [(ngModel)]="selectedStatus" optionLabel="label" 
                  styleClass="w-8rem p-inputtext-sm text-sm" placeholder="สถานะ"></p-dropdown>
      
      <p-dropdown [options]="sortOptions" [(ngModel)]="selectedSort" optionLabel="label" 
                  styleClass="w-8rem p-inputtext-sm text-sm" placeholder="เรียงตาม"></p-dropdown>
      
      <p-button label="ตัวกรอง" icon="pi pi-filter" severity="secondary" size="small" [outlined]="true"></p-button>
    </div>

    <div class="flex align-items-center gap-2">
      <p-button label="ทั่วไป" [rounded]="true" size="small" severity="info" styleClass="text-xs border-none"></p-button>
      <p-button label="น่าสงสัย" [rounded]="true" size="small" severity="warn" styleClass="text-xs border-none text-white"></p-button>
      <p-button label="ละเมิด" [rounded]="true" size="small" severity="danger" styleClass="text-xs border-none"></p-button>
    </div>
  </div>

  <div class="bg-white border-1 border-100 border-round-xl shadow-3 overflow-hidden">
    <div class="flex align-items-center justify-between p-4 border-bottom-1 border-100">
      <div class="text-blue-600 font-semibold text-lg">รายการบันทึก</div>
      <p-iconField iconPosition="right">
        <p-inputIcon styleClass="pi pi-search"></p-inputIcon>
        <input type="text" pInputText placeholder="ค้นหาบันทึก" class="p-inputtext-sm w-15rem" />
      </p-iconField>
    </div>

    <p-table [value]="logs" [(selection)]="selectedLogs" [paginator]="true" [rows]="8" 
             styleClass="p-datatable-sm p-datatable-striped">
      <ng-template pTemplate="header">
        <tr class="text-sm text-600 bg-gray-50">
          <th style="width: 4rem"><p-tableHeaderCheckbox></p-tableHeaderCheckbox></th>
          <th style="width: 20%">วันที่/เวลา</th>
          <th>บันทึก</th>
          <th style="width: 15%">จัดการ</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-log>
        <tr class="text-sm">
          <td><p-tableCheckbox [value]="log"></p-tableCheckbox></td>
          <td class="text-600">
            <div class="flex align-items-center">
              <i class="pi pi-clock mr-2 text-400"></i>
              {{log.date}}
            </div>
          </td>
          <td>
            <div class="flex align-items-center gap-1">
              <span class="text-blue-500 font-medium">{{log.user}}</span>
              <span class="text-700">{{log.action}}</span>
              
              <span [ngClass]="{
                'text-blue-500 font-medium': log.status === 'normal' || log.status === 'info',
                'text-orange-500 font-medium': log.status === 'warning',
                'text-red-500 font-medium': log.status === 'error'
              }">{{log.target}}</span>
              
              <span *ngIf="log.details" class="text-500 ml-1">({{log.details}})</span>
            </div>
          </td>
          <td>
            <div class="flex gap-2">
              <p-button label="เพิ่มเติม" [link]="true" size="small" styleClass="p-0 text-blue-500 text-xs"></p-button>
              <p-button label="ดูประวัติ" [link]="true" size="small" styleClass="p-0 text-500 text-xs"></p-button>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
