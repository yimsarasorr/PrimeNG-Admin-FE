<div class="flex-1 h-full overflow-y-auto pb-0.5 w-full">
  <!-- Header -->
  <div class="flex flex-wrap gap-4 items-start justify-between p-1">
    <div class="flex-1">
      <div class="text-muted-color font-medium leading-normal">Overview</div>
      <div class="text-color text-3xl font-semibold leading-normal">Welcome to PrimeNG</div>
    </div>

    <div class="flex gap-2 whitespace-nowrap flex-nowrap">
      <!-- Search -->
      <span class="p-input-icon-left">
        <i class="pi pi-search"></i>
        <input type="text" pInputText placeholder="Search" />
      </span>

      <!-- Notifications -->
      <p-button icon="pi pi-bell" outlined severity="secondary">
        <p-badge severity="danger" value="" styleClass="p-badge-dot"></p-badge>
      </p-button>
    </div>
  </div>

  <!-- Filters -->
  <div class="mt-4 flex flex-wrap gap-6 items-center justify-between p-1">
    <p-selectButton
      [options]="['Weekly','Monthly','Yearly']"
      [(ngModel)]="selectedPeriod"
    ></p-selectButton>

    <div class="flex items-center gap-2">
      <p-button label="Download" icon="pi pi-download" iconPos="right"></p-button>
      <p-calendar selectionMode="range" dateFormat="dd.mm.yy" showIcon></p-calendar>
    </div>
  </div>

  <!-- Charts & Tables -->
  <div class="grid grid-cols-2 gap-6 mt-2">
    <!-- Chart: full width at top -->
    <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-4 mb-4 w-full">
      <div class="flex items-center justify-between mb-6">
        <div class="text-xl font-bold text-gray-800">Visitor Analytics</div>


      </div>
      <div class="flex-1 flex items-center justify-center w-full" style="min-height:400px;">
        <p-chart 
          type="bar" 
          [data]="chartData" 
          [options]="chartOptions" 
          style="width: 100%; "
          >
        </p-chart>
      </div>
    </div>

    <!-- Transactions and Buildings: side-by-side below chart -->
    <div class="flex gap-6 w-full">
      <!-- Visitor Logs Table: left side -->
      <div class="flex-1 border border-surface rounded-2xl py-3 px-4 flex flex-col">
        <div class="flex items-center gap-6 mb-4">
          <div class="flex-1 text-color font-semibold">Visitor Logs</div>
          <p-button icon="pi pi-ellipsis-h" severity="secondary" text></p-button>
        </div>
        <p-table [value]="visitorLogs" [paginator]="true" [rows]="5">
          <ng-template pTemplate="header">
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Type</th>
              <th>Date</th>
              <th>Status</th>
              <th>Time</th>
              <th>Purpose</th>
            </tr>
          </ng-template>
          <ng-template pTemplate="body" let-row>
            <tr>
              <td>{{row.id}}</td>
              <td>{{row.name}}</td>
              <td>{{row.type}}</td>
              <td>{{row.date}}</td>
              <td>
                <p-tag [value]="row.status" [severity]="row.status === 'Checked In' ? 'success' : 'danger'"></p-tag>
              </td>
              <td>{{row.time}}</td>
              <td>{{row.purpose}}</td>
            </tr>
          </ng-template>
        </p-table>
      </div>

      <!-- Buildings: right side -->
      <div class="flex-1 border border-surface rounded-2xl py-3 px-4 flex flex-col">
        <div class="flex items-center mb-6">
          <div class="flex-1 text-color font-semibold">Buildings</div>
          <p-button icon="pi pi-ellipsis-h" severity="secondary" text></p-button>
        </div>
        <p-meterGroup [value]="visitorTypes" labelPosition="end"></p-meterGroup>
        <p-button label="Show All" outlined styleClass="w-full"></p-button>
      </div>
    </div>
  </div>
</div>
