<div class="min-h-screen flex font-sans bg-white">
  <!-- Sidebar -->
  <!-- <div class="sidebar">
    <div class="logo">
      <span class="text-white font-bold text-lg"></span>
    </div>
    <div class="mt-auto">
      <p-avatar label="U" styleClass="bg-blue-500 text-white" shape="circle"></p-avatar>
    </div>
  </div> -->

  <!-- Main Content -->
  <div class="main-content">
    <!-- Header -->
    <div class="header">
    <div class="flex-container">
        <span class="p-input-icon-left search-box">
        <i class="pi pi-search text-gray-400"></i>
        <input pInputText type="text" placeholder="Search visitor..." />
        </span>
    </div>
    </div>

    <h1 class="page-title">Welcome to Visitor Management</h1>

    <!-- Main Layout -->
    <p-splitter layout="vertical" class="main-splitter">
      <!-- Top: Chart -->
      <ng-template pTemplate>
        <p-panel header="Visitor Analytics" [toggleable]="false" class="panel-full">
          <div class="chart-actions">
            <button
              pButton
              label="Weekly"
              (click)="setChartRange('week')"
              [class]="chartRange === 'week' ? 'p-button-info' : 'p-button-outlined p-button-secondary'"
            ></button>
            <button
              pButton
              label="Monthly"
              (click)="setChartRange('month')"
              [class]="chartRange === 'month' ? 'p-button-info' : 'p-button-outlined p-button-secondary'"
            ></button>
            <button
              pButton
              label="Yearly"
              (click)="setChartRange('year')"
              [class]="chartRange === 'year' ? 'p-button-info' : 'p-button-outlined p-button-secondary'"
            ></button>
          </div>
          <div class="chart-container">
            <p-chart type="bar" [data]="chartData" [options]="chartOptions" class="h-[100rem]"></p-chart>
          </div>
        </p-panel>
      </ng-template>

      <!-- Bottom: Logs + Stats -->
      <ng-template pTemplate>
        <p-splitter layout="horizontal" class="bottom-splitter">
          <!-- Logs -->
          <ng-template pTemplate>
            <p-panel header="Visitor Logs" [toggleable]="false" class="panel-full">
              <p-table [value]="visitorLogs">
                <ng-template pTemplate="header">
                  <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Purpose</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Time</th>
                  </tr>
                </ng-template>
                <ng-template pTemplate="body" let-visitor>
                  <tr>
                    <td>{{ visitor.id }}</td>
                    <td>{{ visitor.name }}</td>
                    <td>{{ visitor.purpose }}</td>
                    <td>{{ visitor.date }}</td>
                    <td>
                      <span
                        [ngClass]="{
                          'text-green-600 font-semibold': visitor.status === 'Checked In',
                          'text-red-500 font-semibold': visitor.status === 'Checked Out'
                        }"
                        >{{ visitor.status }}</span
                      >
                    </td>
                    <td>{{ visitor.time }}</td>
                  </tr>
                </ng-template>
              </p-table>
            </p-panel>
          </ng-template>

          <!-- Stats -->
          <ng-template pTemplate>
            <p-panel header="Visitor Statistics" [toggleable]="false" class="panel-full">
              <div class="stats-container">
                <p-card *ngFor="let stat of visitorStats" class="stat-card">
                  <div class="stat-item">
                    <span class="stat-name">{{ stat.name }}</span>
                    <span class="stat-value">{{ stat.value }}</span>
                  </div>
                </p-card>
              </div>
            </p-panel>
          </ng-template>
        </p-splitter>
      </ng-template>
    </p-splitter>
  </div>
</div>
