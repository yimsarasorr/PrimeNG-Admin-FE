<section class="scanner-page">
  <p-card>
    <ng-template pTemplate="header">
      <div class="scanner-header">
        <h2>Gate QR Scanner</h2>
        <p>ระบบสแกน QR สำหรับบันทึกการเข้า-ออกอาคาร</p>
      </div>
    </ng-template>

    <div class="scanner-content">
      <label class="mode-label">โหมดการสแกน</label>
      <p-selectButton
        [options]="modeOptions"
        [(ngModel)]="selectedMode"
        optionLabel="label"
        optionValue="value"
        [allowEmpty]="false"
      ></p-selectButton>

      <div class="door-pill">
        ใช้ประตู: <strong>{{ selectedDoorId }}</strong>
      </div>

      <div class="camera-select" *ngIf="cameraOptions.length">
        <label for="camera-select">เลือกกล้อง</label>
        <p-dropdown
          inputId="camera-select"
          [options]="cameraOptions"
          optionLabel="label"
          optionValue="value"
          [(ngModel)]="selectedCameraId"
          [disabled]="isBusy"
          placeholder="เลือกกล้อง"
          (onChange)="onCameraChange()"
        ></p-dropdown>
      </div>

      <button
        pButton
        type="button"
        [label]="isScanning ? 'หยุดกล้อง' : 'เริ่มกล้องเพื่อสแกน'"
        icon="pi pi-qrcode"
        [loading]="isBusy"
        [disabled]="isBusy"
        class="scan-button"
        (click)="toggleScanner()"
      ></button>

      <div id="reader" class="reader-box" aria-live="polite"></div>
      <small class="camera-error" *ngIf="cameraError">{{ cameraError }}</small>

      <div class="last-payload" *ngIf="lastPayload as payload">
        <h4>ข้อมูลล่าสุดที่สแกนได้</h4>
        <div>accessId: {{ payload.accessId }}</div>
        <div>doorId (จาก QR): {{ payload.doorId }}</div>
        <div>validUntil: {{ payload.validUntil }}</div>
      </div>
    </div>
  </p-card>
</section>
