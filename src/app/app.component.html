<div class="layout">
  <!-- Sidebar / Topbar -->
  <div class="card">
    <p-menubar [model]="items">
      <ng-template pTemplate="item" let-item>
      <i class="{ item.icon }"></i>
      </ng-template>
    </p-menubar>
  </div>

  <!-- Main content -->
  <div class="main-content">
    <router-outlet></router-outlet>
  </div>
</div>
