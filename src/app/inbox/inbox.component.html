<div class="flex flex-column gap-4 w-full p-4 surface-ground min-h-screen">
  
  <div class="grid grid-nogutter gap-4">
    <div *ngFor="let metric of metrics" class="col-12 md:col-6 lg:col-3 p-2">
      <p-card styleClass="shadow-2 border-none h-full border-round-xl">
        <div class="flex align-items-center justify-content-between">
          <div>
            <span class="block text-500 font-medium mb-1">{{ metric.title }}</span>
            <div class="text-4xl font-bold text-blue-600">{{ metric.value }}</div>
          </div>
          <div class="w-3rem h-3rem border-round bg-gray-50 flex align-items-center justify-content-center border-1 border-100">
            <i [class]="metric.icon" class="text-xl text-700"></i>
          </div>
        </div>
      </p-card>
    </div>
  </div>

  <div class="bg-white border-round-xl border-1 border-100 shadow-3 overflow-hidden flex flex-column">
    <div class="flex flex-wrap align-items-center justify-between p-4 gap-4 border-bottom-1 border-100">
      <div class="flex align-items-center gap-2">
        <span class="text-blue-600 font-bold text-lg border-bottom-2 border-blue-600 pb-1">รายการสถานที่</span>
        <p-button label="เพิ่มอาคาร" icon="pi pi-plus-circle" [outlined]="true" size="small" styleClass="text-blue-400 border-blue-400" (click)="openAddModal()"></p-button>
      </div>
      <p-iconField iconPosition="right">
        <p-inputIcon styleClass="pi pi-search"></p-inputIcon>
        <input type="text" pInputText placeholder="ค้นหาสถานที่" class="p-inputtext-sm w-15rem" />
      </p-iconField>
    </div>

    <p-table [value]="buildings" [(selection)]="selectedBuildings" [paginator]="true" [rows]="10" styleClass="p-datatable-sm">
      <ng-template pTemplate="header">
        <tr class="bg-gray-50 text-gray-600 text-sm">
          <th style="width: 3rem"><p-tableHeaderCheckbox></p-tableHeaderCheckbox></th>
          <th>อาคาร</th>
          <th>ที่อยู่ (Zone)</th>
          <th class="text-center">เวลาทำการ</th>
          <th class="text-center">สถานะ</th>
          <th>จัดการ</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-building>
        <tr class="text-sm hover:bg-gray-50 transition-colors border-bottom-1 border-gray-50">
          <td><p-tableCheckbox [value]="building"></p-tableCheckbox></td>
          <td>
            <div class="flex align-items-center gap-3">
              <div class="w-2rem h-2rem border-round bg-gray-100 flex align-items-center justify-center border-1 border-gray-200">
                <i class="pi pi-building text-gray-400"></i>
              </div>
              <div class="flex flex-column">
                <span class="font-semibold text-gray-800">{{ building.name }}</span>
                <span class="text-xs text-500">{{ building.detail }}</span>
              </div>
            </div>
          </td>
          <td class="text-blue-500 font-medium">{{ building.zone }}</td>
          <td class="text-center font-medium">{{ building.open_time }} - {{ building.close_time }} น.</td>
          <td class="text-center">
            <span class="font-bold" [ngClass]="getSeverity(building.status)">{{ building.status }}</span>
          </td>
          <td>
            <div class="flex gap-2">
              <p-button label="แก้ไข" [link]="true" size="small" styleClass="p-0 text-blue-500 text-xs" (click)="openEditModal(building)"></p-button>
              <p-button label="ลบ" [link]="true" size="small" styleClass="p-0 text-red-400 text-xs" (click)="deleteBuilding(building)"></p-button>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<p-dialog [header]="isEditMode ? 'แก้ไขข้อมูลอาคาร' : 'เพิ่มอาคารใหม่'" [(visible)]="displayModal" [modal]="true" [style]="{width: '700px'}" [breakpoints]="{'960px': '75vw', '640px': '90vw'}">
  <div class="flex flex-column gap-3 mt-3">
    
    <div class="grid">
      <div class="col-6 flex flex-column gap-2">
        <label class="font-semibold text-sm">ชื่ออาคาร</label>
        <input pInputText [(ngModel)]="buildingForm.name" placeholder="เช่น อาคารเรียนรวม" class="w-full" />
      </div>
      <div class="col-6 flex flex-column gap-2">
        <label class="font-semibold text-sm">โซน (Zone)</label>
        <p-dropdown [options]="zoneOptions" [(ngModel)]="buildingForm.zone" appendTo="body" styleClass="w-full"></p-dropdown>
      </div>
    </div>

    <div class="grid">
      <div class="col-6 flex flex-column gap-2">
        <label class="font-semibold text-sm">เวลาเปิดทำการ</label>
        <p-calendar [(ngModel)]="buildingForm.openTimeObj" [timeOnly]="true" inputId="timeonly" styleClass="w-full" appendTo="body"></p-calendar>
      </div>
      <div class="col-6 flex flex-column gap-2">
        <label class="font-semibold text-sm">เวลาปิดทำการ</label>
        <p-calendar [(ngModel)]="buildingForm.closeTimeObj" [timeOnly]="true" inputId="timeonly" styleClass="w-full" appendTo="body"></p-calendar>
      </div>
    </div>

    <div class="flex flex-column gap-2">
      <label class="font-semibold text-sm">รายละเอียดเพิ่มเติม</label>
      <input pInputText [(ngModel)]="buildingForm.detail" placeholder="คำอธิบายสั้นๆ..." class="w-full" />
    </div>

    <p-divider></p-divider>

    <div class="flex justify-content-between align-items-center mb-2">
      <label class="font-semibold text-md text-blue-600">โครงสร้างอาคาร (ชั้นและห้อง)</label>
      <p-button label="เพิ่มชั้น" icon="pi pi-plus" size="small" [outlined]="true" (click)="addFloor()"></p-button>
    </div>

    <div class="flex flex-column gap-3 max-h-20rem overflow-y-auto pr-2">
      <div *ngFor="let floor of buildingForm.floors; let i = index" class="p-3 border-1 border-200 border-round bg-gray-50">
        
        <div class="flex justify-content-between align-items-center mb-3 border-bottom-1 border-300 pb-2">
          <input pInputText [(ngModel)]="floor.floorName" placeholder="ชื่อชั้น" class="p-inputtext-sm font-bold text-blue-600 w-15rem" />
          <p-button icon="pi pi-trash" severity="danger" [text]="true" size="small" (click)="removeFloor(i)"></p-button>
        </div>

        <div class="flex gap-2 mb-3">
          <input pInputText #roomInput placeholder="พิมพ์ชื่อห้องแล้วกด + (เช่น Room 101)" class="p-inputtext-sm w-full" (keydown.enter)="addRoom(i, roomInput.value); roomInput.value=''">
          <p-button icon="pi pi-plus" size="small" (click)="addRoom(i, roomInput.value); roomInput.value=''"></p-button>
        </div>

        <div class="flex flex-column gap-2">
          <div *ngFor="let room of floor.rooms; let j = index" class="flex align-items-center justify-content-between p-2 border-1 border-200 border-round bg-white shadow-1">
            <div class="flex align-items-center gap-2">
              <i class="pi pi-door text-gray-400"></i>
              <span class="font-medium text-sm">{{ room.name }}</span>
            </div>
            
            <div class="flex gap-2 align-items-center">
              <p-dropdown [options]="roomStatusOptions" [(ngModel)]="room.status" appendTo="body" styleClass="p-inputtext-sm w-12rem"></p-dropdown>
              
              <p-button icon="pi pi-times" severity="danger" [text]="true" [rounded]="true" size="small" (click)="removeRoom(i, j)"></p-button>
            </div>
          </div>
          
          <div *ngIf="floor.rooms.length === 0" class="text-center text-500 text-xs py-2">ยังไม่มีห้องในชั้นนี้</div>
        </div>

      </div>
    </div>

  </div>
  <ng-template pTemplate="footer">
    <p-button label="ยกเลิก" icon="pi pi-times" [text]="true" severity="secondary" (click)="displayModal = false"></p-button>
    <p-button label="บันทึกข้อมูล" icon="pi pi-check" (click)="saveBuilding()"></p-button>
  </ng-template>
</p-dialog>

<p-toast></p-toast>
<p-confirmDialog [style]="{width: '400px'}"></p-confirmDialog>
